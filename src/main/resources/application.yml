spring:
  application:
    name: NewsManagementSystem222
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/NewsManagementSystem}
    username: "root"
    password: "1234"
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false


  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${GOOGLE_CLIENT_ID}"
            client-secret: "${GOOGLE_CLIENT_SECRET}"
            scope:
              - openid
              - profile
              - email
          github:
            client-id: "${GITHUB_CLIENT_ID}"
            client-secret: "${GITHUB_CLIENT_SECRET}"
            scope:
              - user
              - email
        provider:
          google:
          github:
#            user-name-attribute: login
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
  endpoint:
    health:
      show-details: always
  tracing:
    export:
      otlp:
        enabled: "${OTLP_TRACING_ENABLED:false}"
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: "${OTLP_METRICS_ENABLED:false}"
        url: "${OTLP_METRICS_URL:http://localhost:4318/v1/metrics}"
  opentelemetry:
    tracing:
      export:
        otlp:
          transport: http
          endpoint: "${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}"
    resource-attributes:
      "service.name": "${spring.application.name}"

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  include-application-name: false
  level:
    org:
      springframework:
        security=DEBUG:

jdbc:
  datasource-proxy:
    enabled: true
    include-parameter-values: false
  opentelemetry:
    enabled: true
    spans:
      enabled: true
  includes:
    - QUERY

#sample
app:
  sample-message: This value was loaded from application.yml with @Value
  news:
    title: News Management System
    page-size: 10

springdoc:
  swagger-ui:
    csrf:
      enabled=true:





