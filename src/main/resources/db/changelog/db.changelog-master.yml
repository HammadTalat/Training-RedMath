  databaseChangeLog:
  - changeSet:
      id: 001-create-news-table
      author: news-management-system
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: news
      changes:
        - createTable:
            tableName: news
            columns:
              - column:
                  name: news_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_news
                    nullable: false
              - column:
                  name: title
                  type: CLOB
              - column:
                  name: details
                  type: CLOB
              - column:
                  name: reported_by
                  type: CLOB
              - column:
                  name: reported_at
                  type: DATETIME(6)
