spring:
  datasource:
    url: jdbc:h2:mem:news_management_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            scope:
              - openid
              - profile
              - email

# Simple values used while the test application is running.
app:
  sample-message: Test message from application.yml
  news:
    title: Test News
    page-size: 5

# Tests do not need to send metrics or traces to a local OpenTelemetry collector.
management:
  otlp:
    metrics:
      export:
        enabled: false
  tracing:
    export:
      otlp:
        enabled: false
